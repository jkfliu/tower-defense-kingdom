<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sylvan Defenders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Sylvan Defenders</h1>
    <div class="hud">
      <span>Wave <strong id="wave-val">0 / 3</strong></span>
      <span>Lives <strong id="lives-val">3</strong></span>
      <span>Score <strong id="score-val">0</strong></span>
      <span>Gold <strong id="gold-val" class="gold">100</strong></span>
      <button id="mute-btn">SFX: ON</button>
      <button id="debug-btn">Debug: OFF</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div class="overlay" id="overlay">
        <p id="msg"></p>
        <p id="sub-msg"></p>
        <button id="action-btn">Play Again</button>
      </div>
    </div>
    <div class="game-btns">
      <button id="start-btn" class="btn">Start Game</button>
      <button id="new-game-btn" class="btn">New Campaign</button>
      <button id="quit-btn" class="btn">Quit to Map</button>
      <a href="preview.html" target="_blank" id="info-btn" class="btn" title="Game Dictionary">?</a>
    </div>
  </div>
  <script src="constants.js"></script>
  <script src="audio.js"></script>
  <script src="path.js"></script>
  <script src="enemies.js"></script>
  <script src="towers.js"></script>
  <script src="map.js"></script>
  <script src="theme.js"></script>
  <script src="ui.js"></script>
  <script src="game.js"></script>
</body>
</html>
